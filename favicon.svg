  </defs>
  <!-- App icon background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Floating grocery items -->
  <text x="32" y="34" text-anchor="middle" font-size="30" font-family="system-ui, -apple-system">🍎</text>
  <text x="14" y="22" text-anchor="middle" font-size="14">🍌</text>
  <text x="50" y="24" text-anchor="middle" font-size="14">🥛</text>

  <!-- Basket -->
  <path d="M10 44 L54 44 L50 58 L14 58 Z" fill="url(#basket)" stroke="#7c2d12" stroke-width="2" stroke-linejoin="round"/>
  <line x1="18" y1="44" x2="20" y2="58" stroke="#7c2d12" stroke-width="1.5"/>
  <line x1="26" y1="44" x2="27" y2="58" stroke="#7c2d12" stroke-width="1.5"/>
  <line x1="34" y1="44" x2="34" y2="58" stroke="#7c2d12" stroke-width="1.5"/>
  <line x1="42" y1="44" x2="41" y2="58" stroke="#7c2d12" stroke-width="1.5"/>
  <line x1="50" y1="44" x2="48" y2="58" stroke="#7c2d12" stroke-width="1.5"/>
