<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#fff3a8"/>
      <stop offset="50%" stop-color="#ffb84d"/>
      <stop offset="100%" stop-color="#c2185b"/>
    </radialGradient>
    <linearGradient id="basket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Big grocery items in front -->
  <g font-family="system-ui, -apple-system, 'Segoe UI Emoji', sans-serif">
    <text x="256" y="260" text-anchor="middle" font-size="220" filter="drop-shadow(0 10px 14px rgba(0,0,0,0.35))">🍎</text>
    <text x="110" y="170" text-anchor="middle" font-size="110" filter="drop-shadow(0 6px 10px rgba(0,0,0,0.35))">🍌</text>
    <text x="400" y="190" text-anchor="middle" font-size="110" filter="drop-shadow(0 6px 10px rgba(0,0,0,0.35))">🥛</text>
    <text x="120" y="380" text-anchor="middle" font-size="100" filter="drop-shadow(0 6px 10px rgba(0,0,0,0.35))">🥕</text>
    <text x="400" y="390" text-anchor="middle" font-size="100" filter="drop-shadow(0 6px 10px rgba(0,0,0,0.35))">🍞</text>
  </g>

  <!-- Basket -->
  <path d="M70 360 L442 360 L408 472 L104 472 Z" fill="url(#basket)" stroke="#7c2d12" stroke-width="10" stroke-linejoin="round"/>
  <g stroke="#7c2d12" stroke-width="6">
    <line x1="140" y1="360" x2="150" y2="472"/>
    <line x1="200" y1="360" x2="206" y2="472"/>
    <line x1="256" y1="360" x2="256" y2="472"/>
    <line x1="312" y1="360" x2="306" y2="472"/>
    <line x1="372" y1="360" x2="362" y2="472"/>
  </g>

  <!-- Small "3D" badge -->
  <g transform="translate(360 60)">
    <rect x="0" y="0" width="110" height="70" rx="18" fill="#ec4899" stroke="#831843" stroke-width="6"/>
    <text x="55" y="52" text-anchor="middle" font-family="Nunito, system-ui, sans-serif" font-weight="900" font-size="46" fill="#fff" stroke="#831843" stroke-width="2">3D</text>
  </g>
</svg>
